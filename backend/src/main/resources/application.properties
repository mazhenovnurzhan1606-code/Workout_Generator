spring.application.name=fitness-ai-app


# H2 Database (for development)
spring.datasource.url=jdbc:postgresql://localhost:5437/postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=fitness

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMinimum256BitsLong
jwt.expiration=86400000

# Grok AI (xAI) API
# Get your key from: https://console.x.ai/

grok.api.key=${GROQ_API_KEY}
grok.api.url=https://api.groq.com/openai/v1/chat/completions
grok.model=llama-3.3-70b-versatile

# Server
server.port=8080

# CORS
spring.web.cors.allowed-origins=http://localhost:3000

# Design Patterns — Creational: Factory Method
# Switch to 'openai' once OpenAiProvider is implemented
ai.provider=grok

